<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_BASE = 'http://127.0.0.1:8000/api';

    if (!localStorage.getItem('access_token')) window.location.href = 'index.html';

    async function apiFetch(endpoint, options = {}) {
        const res = await fetch(API_BASE + endpoint, {
            ...options,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token'),
                'Content-Type': 'application/json',
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { window.location.href = 'index.html'; return null; }
        if (res.ok) return res.status === 204 ? true : await res.json();
        return null;
    }

    function Navbar({ onMenuClick }) {
        return (
            <div className="navbar">
                <div className="navbar-left">
                    <button className="hamburger" onClick={onMenuClick}>☰</button>
                    <h1>✈ Airport Ground Operations</h1>
                </div>
                <button onClick={() => { localStorage.clear(); window.location.href = 'index.html'; }}>Logout</button>
            </div>
        );
    }

    function Sidebar({ open, onClose }) {
        return (
            <>
                <div className={'sidebar-overlay' + (open ? ' open' : '')} onClick={onClose} />
                <div className={'sidebar' + (open ? ' mobile-open' : '')}>
                    <a href="dashboard.html">📊 Dashboard</a>
                    <a href="flights.html">✈ Flights</a>
                    <a href="gates.html">🚪 Gates</a>
                    <a href="baggage.html">🧳 Baggage</a>
                    <a href="maintenance.html" className="active">🔧 Maintenance</a>
                    <a href="staff.html">👷 Staff</a>
                    <a href="notifications.html">🔔 Notifications</a>
                    <a href="reports.html">📋 Reports</a>
                </div>
            </>
        );
    }

    function PriorityBadge({ priority }) {
        const map = {
            low:      'badge-info',
            medium:   'badge-warning',
            high:     'badge-danger',
            critical: 'badge-danger',
        };
        return <span className={'badge ' + (map[priority] || 'badge-info')}>{priority}</span>;
    }

    function StatusBadge({ status }) {
        const map = {
            pending:     'badge-warning',
            in_progress: 'badge-info',
            completed:   'badge-success',
            cancelled:   'badge-danger',
        };
        return <span className={'badge ' + (map[status] || 'badge-info')}>{status.replace('_',' ')}</span>;
    }

    function MaintenanceModal({ item, onClose, onSaved }) {
        const blank = { title:'', description:'', location:'', priority:'medium', status:'pending', assigned_to:'' };
        const [form, setForm] = useState(item || blank);
        const [saving, setSaving] = useState(false);

        function set(k, v) { setForm(f => ({...f, [k]: v})); }

        async function save() {
            setSaving(true);
            const method = item ? 'PUT' : 'POST';
            const url = item ? `/maintenance/${item.id}/` : '/maintenance/';
            const result = await apiFetch(url, { method, body: JSON.stringify(form) });
            setSaving(false);
            if (result) onSaved();
        }

        return (
            <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="modal">
                    <h3>{item ? 'Edit Request' : 'New Maintenance Request'}</h3>
                    {[
                        ['title',       'Title',       'text'],
                        ['location',    'Location',    'text'],
                        ['assigned_to', 'Assigned To', 'text'],
                    ].map(([key, label, type]) => (
                        <div className="form-group" key={key}>
                            <label>{label}</label>
                            <input type={type} value={form[key] || ''} onChange={e => set(key, e.target.value)} />
                        </div>
                    ))}
                    <div className="form-group">
                        <label>Description</label>
                        <textarea rows="3" value={form.description || ''} onChange={e => set('description', e.target.value)}
                            style={{width:'100%',padding:'10px',border:'1px solid #ddd',borderRadius:'6px',fontSize:'0.9rem'}} />
                    </div>
                    <div className="form-group">
                        <label>Priority</label>
                        <select value={form.priority} onChange={e => set('priority', e.target.value)}>
                            {['low','medium','high','critical'].map(p => (
                                <option key={p} value={p}>{p}</option>
                            ))}
                        </select>
                    </div>
                    <div className="form-group">
                        <label>Status</label>
                        <select value={form.status} onChange={e => set('status', e.target.value)}>
                            {['pending','in_progress','completed','cancelled'].map(s => (
                                <option key={s} value={s}>{s.replace('_',' ')}</option>
                            ))}
                        </select>
                    </div>
                    <div className="modal-footer">
                        <button className="btn" onClick={onClose}>Cancel</button>
                        <button className="btn btn-primary" onClick={save} disabled={saving}>
                            {saving ? 'Saving...' : 'Save'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    function MaintenancePage() {
        const [items, setItems] = useState([]);
        const [loading, setLoading] = useState(true);
        const [search, setSearch] = useState('');
        const [modal, setModal] = useState(null);
        const [menuOpen, setMenuOpen] = useState(false);

        async function load() {
            setLoading(true);
            const data = await apiFetch('/maintenance/');
            setItems(data ? (data.results || data) : []);
            setLoading(false);
        }

        useEffect(() => { load(); }, []);

        async function deleteItem(id) {
            if (!confirm('Delete this maintenance request?')) return;
            await apiFetch(`/maintenance/${id}/`, { method: 'DELETE' });
            load();
        }

        const filtered = items.filter(i =>
            (i.title    || '').toLowerCase().includes(search.toLowerCase()) ||
            (i.location || '').toLowerCase().includes(search.toLowerCase())
        );

        const counts = {
            pending:     items.filter(i => i.status === 'pending').length,
            in_progress: items.filter(i => i.status === 'in_progress').length,
            completed:   items.filter(i => i.status === 'completed').length,
            critical:    items.filter(i => i.priority === 'critical').length,
        };

        return (
            <div>
                <Navbar onMenuClick={() => setMenuOpen(true)} />
                <div className="layout">
                    <Sidebar open={menuOpen} onClose={() => setMenuOpen(false)} />
                    <div className="main">
                        <p className="page-title">🔧 Maintenance</p>

                        <div className="cards">
                            <div className="card" style={{borderTop:'4px solid #f39c12'}}>
                                <h3 style={{color:'#f39c12'}}>{counts.pending}</h3>
                                <p>Pending</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #3498db'}}>
                                <h3 style={{color:'#3498db'}}>{counts.in_progress}</h3>
                                <p>In Progress</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #27ae60'}}>
                                <h3 style={{color:'#27ae60'}}>{counts.completed}</h3>
                                <p>Completed</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #e74c3c'}}>
                                <h3 style={{color:'#e74c3c'}}>{counts.critical}</h3>
                                <p>Critical</p>
                            </div>
                        </div>

                        <div className="toolbar">
                            <input
                                className="search-input"
                                placeholder="Search by title or location…"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <button className="btn btn-primary" onClick={() => setModal('add')}>+ New Request</button>
                        </div>

                        <div className="table-container">
                            {loading ? <p style={{padding:'20px',color:'#888'}}>Loading…</p> : (
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Title</th>
                                            <th>Location</th>
                                            <th>Assigned To</th>
                                            <th>Priority</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 ? (
                                            <tr><td colSpan="6" style={{textAlign:'center',color:'#888',padding:'30px'}}>No maintenance requests found.</td></tr>
                                        ) : filtered.map(i => (
                                            <tr key={i.id}>
                                                <td><strong>{i.title}</strong></td>
                                                <td>{i.location || '—'}</td>
                                                <td>{i.assigned_to || '—'}</td>
                                                <td><PriorityBadge priority={i.priority} /></td>
                                                <td><StatusBadge status={i.status} /></td>
                                                <td>
                                                    <button className="btn btn-primary" style={{marginRight:'6px'}} onClick={() => setModal(i)}>Edit</button>
                                                    <button className="btn btn-danger" onClick={() => deleteItem(i.id)}>Delete</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
                {modal && (
                    <MaintenanceModal
                        item={modal === 'add' ? null : modal}
                        onClose={() => setModal(null)}
                        onSaved={() => { setModal(null); load(); }}
                    />
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MaintenancePage />);
</script>
</body>
</html>
