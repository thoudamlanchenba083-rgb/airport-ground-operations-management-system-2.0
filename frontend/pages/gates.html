<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gates - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/gates.css">
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="flights.html">✈ Flights</a>
        <a href="gates.html" class="active">🚪 Gates</a>
        <a href="baggage.html">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="reports.html">📋 Reports</a>
    </div>
    <div class="main">
        <p class="page-title">🚪 Gates</p>

        <div class="cards">
            <div class="card" style="border-top:4px solid #27ae60;">
                <h3 id="countAvailable" style="color:#27ae60;">—</h3>
                <p>Available</p>
            </div>
            <div class="card" style="border-top:4px solid #e74c3c;">
                <h3 id="countOccupied" style="color:#e74c3c;">—</h3>
                <p>Occupied</p>
            </div>
            <div class="card" style="border-top:4px solid #f39c12;">
                <h3 id="countMaintenance" style="color:#f39c12;">—</h3>
                <p>Maintenance</p>
            </div>
        </div>

        <div class="toolbar">
            <input class="search-input" id="searchInput" placeholder="Search by gate number or terminal…" oninput="onSearch(this.value)">
            <button class="btn btn-primary" onclick="openModal(null)">+ Add Gate</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Gate #</th><th>Terminal</th><th>Status</th><th>Notes</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="gatesTbody">
                    <tr><td colspan="5" style="text-align:center;color:#888;padding:30px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">Add Gate</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Gate Number</label><input type="text" id="f_gate_number"></div>
        <div class="form-group"><label>Terminal</label><input type="text" id="f_terminal"></div>
        <div class="form-group"><label>Notes</label><input type="text" id="f_notes"></div>
        <div class="form-group"><label>Status</label>
            <select id="f_status">
                <option value="available">available</option>
                <option value="occupied">occupied</option>
                <option value="maintenance">maintenance</option>
                <option value="closed">closed</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveGate()">Save</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/gates.js"></script>
</body>
</html>
