<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="flights.html">✈ Flights</a>
        <a href="gates.html">🚪 Gates</a>
        <a href="baggage.html">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html" class="active">🔔 Notifications</a>
        <a href="reports.html">📋 Reports</a>
    </div>
    <div class="main">
        <p class="page-title">🔔 Notifications</p>

        <div class="cards">
            <div class="card" style="border-top:4px solid #3498db;">
                <h3 id="countTotal" style="color:#3498db;">—</h3><p>Total</p>
            </div>
            <div class="card" style="border-top:4px solid #e74c3c;">
                <h3 id="countUnread" style="color:#e74c3c;">—</h3><p>Unread</p>
            </div>
            <div class="card" style="border-top:4px solid #27ae60;">
                <h3 id="countRead" style="color:#27ae60;">—</h3><p>Read</p>
            </div>
        </div>

        <div class="toolbar">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button id="filterAll"    class="btn btn-primary" onclick="setFilter('all')">All</button>
                <button id="filterUnread" class="btn"             onclick="setFilter('unread')" style="background:#eee;color:#333;">Unread</button>
                <button id="filterRead"   class="btn"             onclick="setFilter('read')"   style="background:#eee;color:#333;">Read</button>
            </div>
            <div style="display:flex;gap:8px;margin-left:auto;">
                <button id="markAllBtn" class="btn btn-success" onclick="markAllRead()" style="display:none;">✓ Mark All Read</button>
                <button class="btn btn-primary" onclick="openModal(null)">+ New</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Message</th><th>Type</th><th>Status</th><th>Created</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="notifTbody">
                    <tr><td colspan="5" style="text-align:center;color:#888;padding:30px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">New Notification</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Message</label>
            <textarea id="f_message" rows="4" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;background:var(--input-bg);color:var(--text-primary);"></textarea>
        </div>
        <div class="form-group"><label>Type</label>
            <select id="f_type">
                <option value="FLIGHT">FLIGHT</option>
                <option value="MAINTENANCE">MAINTENANCE</option>
                <option value="BAGGAGE">BAGGAGE</option>
                <option value="GENERAL" selected>GENERAL</option>
            </select>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="f_is_read" style="width:auto;">
            <label for="f_is_read" style="margin-bottom:0;">Mark as Read</label>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveNotification()">Save</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/notifications.js"></script>
</body>
</html>
