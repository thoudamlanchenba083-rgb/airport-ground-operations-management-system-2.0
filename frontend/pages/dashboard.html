<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html" class="active">📊 Dashboard</a>
        <a href="flights.html">✈ Flights</a>
        <a href="gates.html">🚪 Gates</a>
        <a href="baggage.html">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="reports.html">📋 Reports</a>
    </div>
    <div class="main">
        <p class="page-title">📊 Dashboard</p>

        <div id="loadingMsg" style="color:#888;padding:20px;">Loading dashboard…</div>

        <div id="dashContent" style="display:none;">
            <!-- Stat Cards -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:2rem;" id="statCards"></div>

            <!-- Charts -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;">
                <div class="card">
                    <canvas id="flightChart" style="max-height:260px;"></canvas>
                    <p id="flightChartEmpty" style="color:#aaa;text-align:center;padding:20px;display:none;">No flight data available</p>
                </div>
                <div class="card">
                    <canvas id="maintChart" style="max-height:260px;"></canvas>
                    <p id="maintChartEmpty" style="color:#aaa;text-align:center;padding:20px;display:none;">No maintenance data available</p>
                </div>
                <div class="card">
                    <canvas id="staffChart" style="max-height:260px;"></canvas>
                    <p id="staffChartEmpty" style="color:#aaa;text-align:center;padding:20px;display:none;">No staff data available</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
