<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_BASE = 'http://127.0.0.1:8000/api';

    if (!localStorage.getItem('access_token')) {
        window.location.href = 'index.html';
    }

    async function apiFetch(endpoint) {
        const res = await fetch(API_BASE + endpoint, {
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token')
            }
        });
        if (res.status === 401) { window.location.href = 'index.html'; return null; }
        if (res.ok) return await res.json();
        return null;
    }

    function Navbar() {
        return (
            <div className="navbar">
                <h1>✈ Airport Ground Operations</h1>
                <button onClick={() => {
                    localStorage.clear();
                    window.location.href = 'index.html';
                }}>Logout</button>
            </div>
        );
    }

    function Sidebar() {
        return (
            <div className="sidebar">
                <a href="dashboard.html" className="active">📊 Dashboard</a>
                <a href="flights.html">✈ Flights</a>
                <a href="gates.html">🚪 Gates</a>
                <a href="baggage.html">🧳 Baggage</a>
                <a href="maintenance.html">🔧 Maintenance</a>
                <a href="staff.html">👷 Staff</a>
                <a href="notifications.html">🔔 Notifications</a>
                <a href="reports.html">📋 Reports</a>
            </div>
        );
    }

    function StatCard({ title, count, color }) {
        return (
            <div className="card" style={{borderTop: '4px solid ' + color}}>
                <h3 style={{color: color}}>{count}</h3>
                <p>{title}</p>
            </div>
        );
    }

    function Dashboard() {
        const [stats, setStats] = useState({
            flights: 0, gates: 0, baggage: 0,
            maintenance: 0, staff: 0, notifications: 0
        });

        useEffect(() => {
            async function loadStats() {
                const [flights, gates, baggage, maintenance, staff, notifications] = await Promise.all([
                    apiFetch('/flights/'),
                    apiFetch('/gates/'),
                    apiFetch('/baggage/'),
                    apiFetch('/maintenance/'),
                    apiFetch('/staff/'),
                    apiFetch('/notifications/')
                ]);
                setStats({
                    flights: flights ? flights.count : 0,
                    gates: gates ? gates.count : 0,
                    baggage: baggage ? baggage.count : 0,
                    maintenance: maintenance ? maintenance.count : 0,
                    staff: staff ? staff.count : 0,
                    notifications: notifications ? notifications.count : 0
                });
            }
            loadStats();
        }, []);

        return (
            <div>
                <Navbar />
                <div className="layout">
                    <Sidebar />
                    <div className="main">
                        <p className="page-title">Dashboard</p>
                        <div className="cards">
                            <StatCard title="Total Flights" count={stats.flights} color="#3498db" />
                            <StatCard title="Gates" count={stats.gates} color="#2ecc71" />
                            <StatCard title="Baggage" count={stats.baggage} color="#e67e22" />
                            <StatCard title="Maintenance" count={stats.maintenance} color="#e74c3c" />
                            <StatCard title="Staff" count={stats.staff} color="#9b59b6" />
                            <StatCard title="Notifications" count={stats.notifications} color="#1abc9c" />
                        </div>
                        <div className="table-container">
                            <h3 style={{marginBottom:'15px', color:'#1a1a2e'}}>Quick Links</h3>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Module</th>
                                        <th>Description</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[
                                        ['✈ Flights', 'Manage airlines, aircraft and flights', 'flights.html'],
                                        ['🚪 Gates', 'Gate assignments and availability', 'gates.html'],
                                        ['🧳 Baggage', 'Baggage tracking and management', 'baggage.html'],
                                        ['🔧 Maintenance', 'Maintenance requests and logs', 'maintenance.html'],
                                        ['👷 Staff', 'Staff, shifts and schedules', 'staff.html'],
                                        ['🔔 Notifications', 'System notifications', 'notifications.html'],
                                        ['📋 Reports', 'Operational reports', 'reports.html'],
                                    ].map(([name, desc, link]) => (
                                        <tr key={link}>
                                            <td><strong>{name}</strong></td>
                                            <td>{desc}</td>
                                            <td><a href={link} className="btn btn-primary">Open</a></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
