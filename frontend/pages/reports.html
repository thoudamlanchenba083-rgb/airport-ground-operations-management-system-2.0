<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reports.css">
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="flights.html">✈ Flights</a>
        <a href="gates.html">🚪 Gates</a>
        <a href="baggage.html">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="reports.html" class="active">📋 Reports</a>
    </div>
    <div class="main">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
            <p class="page-title" style="margin-bottom:0;">📋 Operations Report</p>
            <button class="btn btn-success" id="exportBtn" onclick="exportCSV()" disabled>⬇ Export CSV</button>
        </div>

        <div id="loadingMsg" style="padding:30px;color:#888;text-align:center;">Loading report data…</div>
        <div id="errorMsg"   style="padding:30px;color:#e74c3c;text-align:center;display:none;">Failed to load data.</div>

        <div id="reportGrid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
