<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baggage - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_BASE = 'http://127.0.0.1:8000/api';

    if (!localStorage.getItem('access_token')) window.location.href = 'index.html';

    async function apiFetch(endpoint, options = {}) {
        const res = await fetch(API_BASE + endpoint, {
            ...options,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token'),
                'Content-Type': 'application/json',
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { window.location.href = 'index.html'; return null; }
        if (res.ok) return res.status === 204 ? true : await res.json();
        return null;
    }

    function Navbar({ onMenuClick }) {
        return (
            <div className="navbar">
                <div className="navbar-left">
                    <button className="hamburger" onClick={onMenuClick}>☰</button>
                    <h1>✈ Airport Ground Operations</h1>
                </div>
                <button onClick={() => { localStorage.clear(); window.location.href = 'index.html'; }}>Logout</button>
            </div>
        );
    }

    function Sidebar({ open, onClose }) {
        return (
            <>
                <div className={'sidebar-overlay' + (open ? ' open' : '')} onClick={onClose} />
                <div className={'sidebar' + (open ? ' mobile-open' : '')}>
                    <a href="dashboard.html">📊 Dashboard</a>
                    <a href="flights.html">✈ Flights</a>
                    <a href="gates.html">🚪 Gates</a>
                    <a href="baggage.html" className="active">🧳 Baggage</a>
                    <a href="maintenance.html">🔧 Maintenance</a>
                    <a href="staff.html">👷 Staff</a>
                    <a href="notifications.html">🔔 Notifications</a>
                    <a href="reports.html">📋 Reports</a>
                </div>
            </>
        );
    }

    function StatusBadge({ status }) {
        const map = {
            checked_in:  'badge-info',
            loaded:      'badge-warning',
            in_transit:  'badge-warning',
            delivered:   'badge-success',
            missing:     'badge-danger',
            damaged:     'badge-danger',
        };
        return <span className={'badge ' + (map[status] || 'badge-info')}>{status.replace('_',' ')}</span>;
    }

    function BaggageModal({ item, onClose, onSaved }) {
        const blank = { tag_number:'', passenger_name:'', flight:'', weight:'', status:'checked_in', description:'' };
        const [form, setForm] = useState(item || blank);
        const [saving, setSaving] = useState(false);

        function set(k, v) { setForm(f => ({...f, [k]: v})); }

        async function save() {
            setSaving(true);
            const method = item ? 'PUT' : 'POST';
            const url = item ? `/baggage/${item.id}/` : '/baggage/';
            const result = await apiFetch(url, { method, body: JSON.stringify(form) });
            setSaving(false);
            if (result) onSaved();
        }

        return (
            <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="modal">
                    <h3>{item ? 'Edit Baggage' : 'Add Baggage'}</h3>
                    {[
                        ['tag_number',      'Tag Number',      'text'],
                        ['passenger_name',  'Passenger Name',  'text'],
                        ['flight',          'Flight ID',       'text'],
                        ['weight',          'Weight (kg)',     'number'],
                        ['description',     'Description',     'text'],
                    ].map(([key, label, type]) => (
                        <div className="form-group" key={key}>
                            <label>{label}</label>
                            <input type={type} value={form[key] || ''} onChange={e => set(key, e.target.value)} />
                        </div>
                    ))}
                    <div className="form-group">
                        <label>Status</label>
                        <select value={form.status} onChange={e => set('status', e.target.value)}>
                            {['checked_in','loaded','in_transit','delivered','missing','damaged'].map(s => (
                                <option key={s} value={s}>{s.replace('_',' ')}</option>
                            ))}
                        </select>
                    </div>
                    <div className="modal-footer">
                        <button className="btn" onClick={onClose}>Cancel</button>
                        <button className="btn btn-primary" onClick={save} disabled={saving}>
                            {saving ? 'Saving...' : 'Save'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    function BaggagePage() {
        const [baggage, setBaggage] = useState([]);
        const [loading, setLoading] = useState(true);
        const [search, setSearch] = useState('');
        const [modal, setModal] = useState(null);
        const [menuOpen, setMenuOpen] = useState(false);

        async function load() {
            setLoading(true);
            const data = await apiFetch('/baggage/');
            setBaggage(data ? (data.results || data) : []);
            setLoading(false);
        }

        useEffect(() => { load(); }, []);

        async function deleteItem(id) {
            if (!confirm('Delete this baggage record?')) return;
            await apiFetch(`/baggage/${id}/`, { method: 'DELETE' });
            load();
        }

        const filtered = baggage.filter(b =>
            (b.tag_number      || '').toLowerCase().includes(search.toLowerCase()) ||
            (b.passenger_name  || '').toLowerCase().includes(search.toLowerCase())
        );

        const counts = {
            total:     baggage.length,
            delivered: baggage.filter(b => b.status === 'delivered').length,
            missing:   baggage.filter(b => b.status === 'missing').length,
            damaged:   baggage.filter(b => b.status === 'damaged').length,
        };

        return (
            <div>
                <Navbar onMenuClick={() => setMenuOpen(true)} />
                <div className="layout">
                    <Sidebar open={menuOpen} onClose={() => setMenuOpen(false)} />
                    <div className="main">
                        <p className="page-title">🧳 Baggage</p>

                        <div className="cards">
                            <div className="card" style={{borderTop:'4px solid #3498db'}}>
                                <h3 style={{color:'#3498db'}}>{counts.total}</h3>
                                <p>Total Items</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #27ae60'}}>
                                <h3 style={{color:'#27ae60'}}>{counts.delivered}</h3>
                                <p>Delivered</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #e74c3c'}}>
                                <h3 style={{color:'#e74c3c'}}>{counts.missing}</h3>
                                <p>Missing</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #f39c12'}}>
                                <h3 style={{color:'#f39c12'}}>{counts.damaged}</h3>
                                <p>Damaged</p>
                            </div>
                        </div>

                        <div className="toolbar">
                            <input
                                className="search-input"
                                placeholder="Search by tag number or passenger name…"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <button className="btn btn-primary" onClick={() => setModal('add')}>+ Add Baggage</button>
                        </div>

                        <div className="table-container">
                            {loading ? <p style={{padding:'20px',color:'#888'}}>Loading…</p> : (
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Tag #</th>
                                            <th>Passenger</th>
                                            <th>Flight</th>
                                            <th>Weight</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 ? (
                                            <tr><td colSpan="6" style={{textAlign:'center',color:'#888',padding:'30px'}}>No baggage records found.</td></tr>
                                        ) : filtered.map(b => (
                                            <tr key={b.id}>
                                                <td><strong>{b.tag_number}</strong></td>
                                                <td>{b.passenger_name || '—'}</td>
                                                <td>{b.flight || '—'}</td>
                                                <td>{b.weight ? b.weight + ' kg' : '—'}</td>
                                                <td><StatusBadge status={b.status} /></td>
                                                <td>
                                                    <button className="btn btn-primary" style={{marginRight:'6px'}} onClick={() => setModal(b)}>Edit</button>
                                                    <button className="btn btn-danger" onClick={() => deleteItem(b.id)}>Delete</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
                {modal && (
                    <BaggageModal
                        item={modal === 'add' ? null : modal}
                        onClose={() => setModal(null)}
                        onSaved={() => { setModal(null); load(); }}
                    />
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BaggagePage />);
</script>
</body>
</html>
