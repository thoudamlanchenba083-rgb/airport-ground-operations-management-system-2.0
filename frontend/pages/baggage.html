<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baggage - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/baggage.css">
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="flights.html">✈ Flights</a>
        <a href="gates.html">🚪 Gates</a>
        <a href="baggage.html" class="active">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="reports.html">📋 Reports</a>
    </div>
    <div class="main">
        <p class="page-title">🧳 Baggage</p>

        <div class="cards">
            <div class="card" style="border-top:4px solid #3498db;">
                <h3 id="countTotal" style="color:#3498db;">—</h3><p>Total Items</p>
            </div>
            <div class="card" style="border-top:4px solid #f39c12;">
                <h3 id="countTransit" style="color:#f39c12;">—</h3><p>In Transit</p>
            </div>
            <div class="card" style="border-top:4px solid #27ae60;">
                <h3 id="countArrived" style="color:#27ae60;">—</h3><p>Arrived</p>
            </div>
            <div class="card" style="border-top:4px solid #9b59b6;">
                <h3 id="countClaimed" style="color:#9b59b6;">—</h3><p>Claimed</p>
            </div>
        </div>

        <div class="toolbar">
            <input class="search-input" id="searchInput" placeholder="Search by tag or passenger name…" oninput="onSearch(this.value)">
            <button class="btn btn-primary" onclick="openModal(null)">+ Add Baggage</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tag #</th><th>Passenger</th><th>Flight</th>
                        <th>Weight</th><th>Latest Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="baggageTbody">
                    <tr><td colspan="6" style="text-align:center;color:#888;padding:30px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Baggage Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">Add Baggage</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Baggage Tag</label><input type="text" id="f_baggage_tag"></div>
        <div class="form-group"><label>Passenger Name</label><input type="text" id="f_passenger_name"></div>
        <div class="form-group"><label>Flight</label>
            <select id="f_flight"><option value="">-- Select Flight --</option></select>
        </div>
        <div class="form-group"><label>Weight (kg)</label><input type="number" step="0.01" id="f_weight"></div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveBaggage()">Save</button>
        </div>
    </div>
</div>

<!-- Tracking Modal -->
<div class="modal-overlay" id="trackOverlay" onclick="if(event.target===this)closeTrackModal()">
    <div class="modal">
        <h3 id="trackTitle">Update Status</h3>
        <input type="hidden" id="trackBaggageId">
        <div class="form-group"><label>New Status</label>
            <select id="f_track_status">
                <option value="CHECKED_IN">CHECKED IN</option>
                <option value="LOADED">LOADED</option>
                <option value="IN_TRANSIT">IN TRANSIT</option>
                <option value="ARRIVED">ARRIVED</option>
                <option value="CLAIMED">CLAIMED</option>
            </select>
        </div>
        <p id="trackError" style="color:#e74c3c;font-size:0.85rem;display:none;"></p>
        <div class="modal-footer">
            <button class="btn" onclick="closeTrackModal()">Cancel</button>
            <button class="btn btn-primary" id="trackSaveBtn" onclick="saveTracking()">Add Status</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/baggage.js"></script>
</body>
</html>
