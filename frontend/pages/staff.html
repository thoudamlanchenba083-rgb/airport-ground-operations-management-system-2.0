<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_BASE = 'http://127.0.0.1:8000/api';

    if (!localStorage.getItem('access_token')) window.location.href = 'index.html';

    async function apiFetch(endpoint, options = {}) {
        const res = await fetch(API_BASE + endpoint, {
            ...options,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token'),
                'Content-Type': 'application/json',
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { window.location.href = 'index.html'; return null; }
        if (res.ok) return res.status === 204 ? true : await res.json();
        return null;
    }

    function Navbar({ onMenuClick }) {
        return (
            <div className="navbar">
                <div className="navbar-left">
                    <button className="hamburger" onClick={onMenuClick}>☰</button>
                    <h1>✈ Airport Ground Operations</h1>
                </div>
                <button onClick={() => { localStorage.clear(); window.location.href = 'index.html'; }}>Logout</button>
            </div>
        );
    }

    function Sidebar({ open, onClose }) {
        return (
            <>
                <div className={'sidebar-overlay' + (open ? ' open' : '')} onClick={onClose} />
                <div className={'sidebar' + (open ? ' mobile-open' : '')}>
                    <a href="dashboard.html">📊 Dashboard</a>
                    <a href="flights.html">✈ Flights</a>
                    <a href="gates.html">🚪 Gates</a>
                    <a href="baggage.html">🧳 Baggage</a>
                    <a href="maintenance.html">🔧 Maintenance</a>
                    <a href="staff.html" className="active">👷 Staff</a>
                    <a href="notifications.html">🔔 Notifications</a>
                    <a href="reports.html">📋 Reports</a>
                </div>
            </>
        );
    }

    function RoleBadge({ role }) {
        const map = {
            manager:      'badge-danger',
            supervisor:   'badge-warning',
            ground_crew:  'badge-info',
            security:     'badge-info',
            technician:   'badge-warning',
            admin:        'badge-success',
        };
        return <span className={'badge ' + (map[role] || 'badge-info')}>{(role || '').replace('_',' ')}</span>;
    }

    function ShiftBadge({ shift }) {
        const map = { morning:'badge-success', afternoon:'badge-warning', night:'badge-info' };
        return <span className={'badge ' + (map[shift] || 'badge-info')}>{shift}</span>;
    }

    function StaffModal({ member, onClose, onSaved }) {
        const blank = { first_name:'', last_name:'', email:'', phone:'', role:'ground_crew', shift:'morning', department:'' };
        const [form, setForm] = useState(member || blank);
        const [saving, setSaving] = useState(false);

        function set(k, v) { setForm(f => ({...f, [k]: v})); }

        async function save() {
            setSaving(true);
            const method = member ? 'PUT' : 'POST';
            const url = member ? `/staff/${member.id}/` : '/staff/';
            const result = await apiFetch(url, { method, body: JSON.stringify(form) });
            setSaving(false);
            if (result) onSaved();
        }

        return (
            <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="modal">
                    <h3>{member ? 'Edit Staff Member' : 'Add Staff Member'}</h3>
                    {[
                        ['first_name',  'First Name',  'text'],
                        ['last_name',   'Last Name',   'text'],
                        ['email',       'Email',       'email'],
                        ['phone',       'Phone',       'text'],
                        ['department',  'Department',  'text'],
                    ].map(([key, label, type]) => (
                        <div className="form-group" key={key}>
                            <label>{label}</label>
                            <input type={type} value={form[key] || ''} onChange={e => set(key, e.target.value)} />
                        </div>
                    ))}
                    <div className="form-group">
                        <label>Role</label>
                        <select value={form.role} onChange={e => set('role', e.target.value)}>
                            {['ground_crew','supervisor','manager','security','technician','admin'].map(r => (
                                <option key={r} value={r}>{r.replace('_',' ')}</option>
                            ))}
                        </select>
                    </div>
                    <div className="form-group">
                        <label>Shift</label>
                        <select value={form.shift} onChange={e => set('shift', e.target.value)}>
                            {['morning','afternoon','night'].map(s => (
                                <option key={s} value={s}>{s}</option>
                            ))}
                        </select>
                    </div>
                    <div className="modal-footer">
                        <button className="btn" onClick={onClose}>Cancel</button>
                        <button className="btn btn-primary" onClick={save} disabled={saving}>
                            {saving ? 'Saving...' : 'Save'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    function StaffPage() {
        const [staff, setStaff] = useState([]);
        const [loading, setLoading] = useState(true);
        const [search, setSearch] = useState('');
        const [modal, setModal] = useState(null);
        const [menuOpen, setMenuOpen] = useState(false);

        async function load() {
            setLoading(true);
            const data = await apiFetch('/staff/');
            setStaff(data ? (data.results || data) : []);
            setLoading(false);
        }

        useEffect(() => { load(); }, []);

        async function deleteMember(id) {
            if (!confirm('Delete this staff member?')) return;
            await apiFetch(`/staff/${id}/`, { method: 'DELETE' });
            load();
        }

        const filtered = staff.filter(s =>
            (s.first_name  || '').toLowerCase().includes(search.toLowerCase()) ||
            (s.last_name   || '').toLowerCase().includes(search.toLowerCase()) ||
            (s.department  || '').toLowerCase().includes(search.toLowerCase()) ||
            (s.role        || '').toLowerCase().includes(search.toLowerCase())
        );

        const counts = {
            total:      staff.length,
            morning:    staff.filter(s => s.shift === 'morning').length,
            afternoon:  staff.filter(s => s.shift === 'afternoon').length,
            night:      staff.filter(s => s.shift === 'night').length,
        };

        return (
            <div>
                <Navbar onMenuClick={() => setMenuOpen(true)} />
                <div className="layout">
                    <Sidebar open={menuOpen} onClose={() => setMenuOpen(false)} />
                    <div className="main">
                        <p className="page-title">👷 Staff</p>

                        <div className="cards">
                            <div className="card" style={{borderTop:'4px solid #9b59b6'}}>
                                <h3 style={{color:'#9b59b6'}}>{counts.total}</h3>
                                <p>Total Staff</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #f39c12'}}>
                                <h3 style={{color:'#f39c12'}}>{counts.morning}</h3>
                                <p>Morning Shift</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #3498db'}}>
                                <h3 style={{color:'#3498db'}}>{counts.afternoon}</h3>
                                <p>Afternoon Shift</p>
                            </div>
                            <div className="card" style={{borderTop:'4px solid #1a1a2e'}}>
                                <h3 style={{color:'#1a1a2e'}}>{counts.night}</h3>
                                <p>Night Shift</p>
                            </div>
                        </div>

                        <div className="toolbar">
                            <input
                                className="search-input"
                                placeholder="Search by name, role or department…"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <button className="btn btn-primary" onClick={() => setModal('add')}>+ Add Staff</button>
                        </div>

                        <div className="table-container">
                            {loading ? <p style={{padding:'20px',color:'#888'}}>Loading…</p> : (
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Email</th>
                                            <th>Phone</th>
                                            <th>Department</th>
                                            <th>Role</th>
                                            <th>Shift</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 ? (
                                            <tr><td colSpan="7" style={{textAlign:'center',color:'#888',padding:'30px'}}>No staff found.</td></tr>
                                        ) : filtered.map(s => (
                                            <tr key={s.id}>
                                                <td><strong>{s.first_name} {s.last_name}</strong></td>
                                                <td>{s.email || '—'}</td>
                                                <td>{s.phone || '—'}</td>
                                                <td>{s.department || '—'}</td>
                                                <td><RoleBadge role={s.role} /></td>
                                                <td><ShiftBadge shift={s.shift} /></td>
                                                <td>
                                                    <button className="btn btn-primary" style={{marginRight:'6px'}} onClick={() => setModal(s)}>Edit</button>
                                                    <button className="btn btn-danger" onClick={() => deleteMember(s.id)}>Delete</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
                {modal && (
                    <StaffModal
                        member={modal === 'add' ? null : modal}
                        onClose={() => setModal(null)}
                        onSaved={() => { setModal(null); load(); }}
                    />
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<StaffPage />);
</script>
</body>
</html>
