<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_BASE = 'http://127.0.0.1:8000/api';

    if (!localStorage.getItem('access_token')) window.location.href = 'index.html';

    async function apiFetch(endpoint, options = {}) {
        const res = await fetch(API_BASE + endpoint, {
            ...options,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token'),
                'Content-Type': 'application/json',
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { window.location.href = 'index.html'; return null; }
        if (res.ok) return res.status === 204 ? true : await res.json();
        return null;
    }

    function Navbar({ onMenuClick }) {
        return (
            <div className="navbar">
                <div className="navbar-left">
                    <button className="hamburger" onClick={onMenuClick}>☰</button>
                    <h1>✈ Airport Ground Operations</h1>
                </div>
                <button onClick={() => { localStorage.clear(); window.location.href = 'index.html'; }}>Logout</button>
            </div>
        );
    }

    function Sidebar({ open, onClose }) {
        return (
            <>
                <div className={'sidebar-overlay' + (open ? ' open' : '')} onClick={onClose} />
                <div className={'sidebar' + (open ? ' mobile-open' : '')}>
                    <a href="dashboard.html">📊 Dashboard</a>
                    <a href="flights.html" className="active">✈ Flights</a>
                    <a href="gates.html">🚪 Gates</a>
                    <a href="baggage.html">🧳 Baggage</a>
                    <a href="maintenance.html">🔧 Maintenance</a>
                    <a href="staff.html">👷 Staff</a>
                    <a href="notifications.html">🔔 Notifications</a>
                    <a href="reports.html">📋 Reports</a>
                </div>
            </>
        );
    }

    function StatusBadge({ status }) {
        const map = {
            scheduled: 'badge-info',
            boarding:  'badge-warning',
            departed:  'badge-success',
            arrived:   'badge-success',
            delayed:   'badge-danger',
            cancelled: 'badge-danger',
        };
        return <span className={'badge ' + (map[status] || 'badge-info')}>{status}</span>;
    }

    function FlightModal({ flight, onClose, onSaved }) {
        const blank = { flight_number:'', origin:'', destination:'', scheduled_departure:'', scheduled_arrival:'', status:'scheduled', aircraft_type:'' };
        const [form, setForm] = useState(flight || blank);
        const [saving, setSaving] = useState(false);

        function set(k, v) { setForm(f => ({...f, [k]: v})); }

        async function save() {
            setSaving(true);
            const method = flight ? 'PUT' : 'POST';
            const url = flight ? `/flights/${flight.id}/` : '/flights/';
            const result = await apiFetch(url, { method, body: JSON.stringify(form) });
            setSaving(false);
            if (result) onSaved();
        }

        return (
            <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="modal">
                    <h3>{flight ? 'Edit Flight' : 'Add Flight'}</h3>
                    {[
                        ['flight_number','Flight Number','text'],
                        ['origin','Origin','text'],
                        ['destination','Destination','text'],
                        ['scheduled_departure','Scheduled Departure','datetime-local'],
                        ['scheduled_arrival','Scheduled Arrival','datetime-local'],
                        ['aircraft_type','Aircraft Type','text'],
                    ].map(([key, label, type]) => (
                        <div className="form-group" key={key}>
                            <label>{label}</label>
                            <input type={type} value={form[key] || ''} onChange={e => set(key, e.target.value)} />
                        </div>
                    ))}
                    <div className="form-group">
                        <label>Status</label>
                        <select value={form.status} onChange={e => set('status', e.target.value)}>
                            {['scheduled','boarding','departed','arrived','delayed','cancelled'].map(s => (
                                <option key={s} value={s}>{s}</option>
                            ))}
                        </select>
                    </div>
                    <div className="modal-footer">
                        <button className="btn" onClick={onClose}>Cancel</button>
                        <button className="btn btn-primary" onClick={save} disabled={saving}>
                            {saving ? 'Saving...' : 'Save'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    function FlightsPage() {
        const [flights, setFlights] = useState([]);
        const [loading, setLoading] = useState(true);
        const [search, setSearch] = useState('');
        const [modal, setModal] = useState(null);
        const [menuOpen, setMenuOpen] = useState(false);

        async function load() {
            setLoading(true);
            const data = await apiFetch('/flights/');
            setFlights(data ? (data.results || data) : []);
            setLoading(false);
        }

        useEffect(() => { load(); }, []);

        async function deleteFlight(id) {
            if (!confirm('Delete this flight?')) return;
            await apiFetch(`/flights/${id}/`, { method: 'DELETE' });
            load();
        }

        const filtered = flights.filter(f =>
            (f.flight_number || '').toLowerCase().includes(search.toLowerCase()) ||
            (f.origin || '').toLowerCase().includes(search.toLowerCase()) ||
            (f.destination || '').toLowerCase().includes(search.toLowerCase())
        );

        return (
            <div>
                <Navbar onMenuClick={() => setMenuOpen(true)} />
                <div className="layout">
                    <Sidebar open={menuOpen} onClose={() => setMenuOpen(false)} />
                    <div className="main">
                        <p className="page-title">✈ Flights</p>
                        <div className="toolbar">
                            <input
                                className="search-input"
                                placeholder="Search by flight, origin, destination…"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <button className="btn btn-primary" onClick={() => setModal('add')}>+ Add Flight</button>
                        </div>
                        <div className="table-container">
                            {loading ? <p style={{padding:'20px',color:'#888'}}>Loading…</p> : (
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Flight #</th>
                                            <th>Origin</th>
                                            <th>Destination</th>
                                            <th>Departure</th>
                                            <th>Arrival</th>
                                            <th>Aircraft</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 ? (
                                            <tr><td colSpan="8" style={{textAlign:'center',color:'#888',padding:'30px'}}>No flights found.</td></tr>
                                        ) : filtered.map(f => (
                                            <tr key={f.id}>
                                                <td><strong>{f.flight_number}</strong></td>
                                                <td>{f.origin}</td>
                                                <td>{f.destination}</td>
                                                <td>{f.scheduled_departure ? new Date(f.scheduled_departure).toLocaleString() : '—'}</td>
                                                <td>{f.scheduled_arrival ? new Date(f.scheduled_arrival).toLocaleString() : '—'}</td>
                                                <td>{f.aircraft_type || '—'}</td>
                                                <td><StatusBadge status={f.status} /></td>
                                                <td>
                                                    <button className="btn btn-primary" style={{marginRight:'6px'}} onClick={() => setModal(f)}>Edit</button>
                                                    <button className="btn btn-danger" onClick={() => deleteFlight(f.id)}>Delete</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
                {modal && (
                    <FlightModal
                        flight={modal === 'add' ? null : modal}
                        onClose={() => setModal(null)}
                        onSaved={() => { setModal(null); load(); }}
                    />
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FlightsPage />);
</script>
</body>
</html>
