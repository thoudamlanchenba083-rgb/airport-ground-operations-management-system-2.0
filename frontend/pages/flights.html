<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights - Airport Operations</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/flights.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="navbar">
    <div class="navbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>✈ Airport Ground Operations</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeBtn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:0.85rem;">🌙 Dark</button>
        <button onclick="Auth.logout()">Logout</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="flights.html" class="active">✈ Flights</a>
        <a href="gates.html">🚪 Gates</a>
        <a href="baggage.html">🧳 Baggage</a>
        <a href="maintenance.html">🔧 Maintenance</a>
        <a href="staff.html">👷 Staff</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="reports.html">📋 Reports</a>
    </div>
    <div class="main">
        <p class="page-title">✈ Flights</p>
        <div class="toolbar">
            <input class="search-input" id="searchInput" placeholder="Search by flight, origin, destination…" oninput="onSearch(this.value)">
            <button class="btn btn-primary" onclick="openModal(null)">+ Add Flight</button>
        </div>
        <div class="table-container">
            <table id="flightsTable">
                <thead>
                    <tr>
                        <th>Flight #</th><th>Origin</th><th>Destination</th>
                        <th>Departure</th><th>Arrival</th><th>Aircraft</th>
                        <th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="flightsTbody">
                    <tr><td colspan="8" style="text-align:center;color:#888;padding:30px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-top:8px;">
            <button class="btn" id="prevBtn" onclick="goPage(-1)" disabled>← Prev</button>
            <span id="pageInfo" style="font-size:0.85rem;color:#888;">Page 1</span>
            <button class="btn" id="nextBtn" onclick="goPage(1)" disabled>Next →</button>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">Add Flight</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Flight Number</label><input type="text" id="f_flight_number"></div>
        <div class="form-group"><label>Airline</label>
            <select id="f_airline"><option value="">-- Select Airline --</option></select>
        </div>
        <div class="form-group"><label>Aircraft</label>
            <select id="f_aircraft"><option value="">-- Select Aircraft --</option></select>
        </div>
        <div class="form-group"><label>Origin</label><input type="text" id="f_origin"></div>
        <div class="form-group"><label>Destination</label><input type="text" id="f_destination"></div>
        <div class="form-group"><label>Departure Time</label><input type="datetime-local" id="f_departure_time"></div>
        <div class="form-group"><label>Arrival Time</label><input type="datetime-local" id="f_arrival_time"></div>
        <div class="form-group"><label>Status</label>
            <select id="f_status">
                <option>SCHEDULED</option><option>BOARDING</option>
                <option>DEPARTED</option><option>ARRIVED</option><option>CANCELLED</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveFlight()">Save</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/flights.js"></script>
</body>
</html>
