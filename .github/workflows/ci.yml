name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      RATELIMIT_ENABLE: "False"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Test accounts
        run: python manage.py test accounts --verbosity=2

      - name: Test flights
        run: python manage.py test flights --verbosity=2

      - name: Test gates
        run: python manage.py test gates --verbosity=2

      - name: Test staff
        run: python manage.py test staff --verbosity=2

      - name: Test maintenance
        run: python manage.py test maintenance --verbosity=2

      - name: Test baggage
        run: python manage.py test baggage --verbosity=2

      - name: Test notifications
        run: python manage.py test notifications --verbosity=2

      - name: Test reports
        run: python manage.py test reports --verbosity=2

      - name: Test ground_equipment
        run: python manage.py test ground_equipment --verbosity=2

      - name: Test hr_management
        run: python manage.py test hr_management --verbosity=2

      - name: Test ai_module
        run: python manage.py test ai_module --verbosity=2

      - name: Test core_app
        run: python manage.py test core_app --verbosity=2

      - name: Security tests
        run: python manage.py test core_app.security_tests --verbosity=2

      - name: Run integration tests
        run: python manage.py test core_app.integration_tests --verbosity=2

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --exclude=env,migrations,__pycache__,.git \
            --max-line-length=120 \
            --ignore=E501,W503,W504 \
            --count

  frontend-tests:
    name: Frontend UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests

        working-directory: frontend
        run: npm run test